services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bothosting
      POSTGRES_USER: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [bot-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redisdata:/data
    networks: [bot-network]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: bot-platform-api:latest
    restart: always
    environment:
      NODE_ENV: production
      # Defaults to the local "postgres" container. Set DATABASE_URL/DIRECT_URL
      # in .env to point to Supabase (or any external Postgres) instead.
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/bothosting}
      DIRECT_URL: ${DIRECT_URL:-postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/bothosting}
      # Limit Node.js memory to reduce OOM risk on small VPS (adjust as needed)
      NODE_OPTIONS: "--max-old-space-size=600"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      RUNNER_INTERNAL_URL: http://bot-runner:4001
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      MPESA_WEBHOOK_SECRET: ${MPESA_WEBHOOK_SECRET:-}
      EMOLA_WEBHOOK_SECRET: ${EMOLA_WEBHOOK_SECRET:-}
      MKESH_WEBHOOK_SECRET: ${MKESH_WEBHOOK_SECRET:-}
      # Super admin (platform owner) — created on first boot if set
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-}
      APP_VERSION: ${APP_VERSION:-1.0.0}
    volumes:
      - uploads-data:/app/uploads
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [bot-network]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 700M

  bot-runner:
    image: bot-platform-runner:latest
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - session-data:/data/sessions
    environment:
      NODE_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      BOT_ENGINE_IMAGE: bot-engine:latest
      # Limit Node memory for runner orchestrator
      NODE_OPTIONS: "--max-old-space-size=256"
    depends_on:
      redis:
        condition: service_healthy
    networks: [bot-network]
    deploy:
      resources:
        limits:
          memory: 400M

  worker:
    image: bot-platform-worker:latest
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/bothosting}
      DIRECT_URL: ${DIRECT_URL:-postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/bothosting}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Limit worker process memory (adjust according to workload)
      NODE_OPTIONS: "--max-old-space-size=512"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [bot-network]
    deploy:
      resources:
        limits:
          memory: 600M

  web:
    image: bot-platform-web:latest
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${FRONTEND_API_URL:-http://localhost:3000}
      NODE_OPTIONS: "--max-old-space-size=512"
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy
    networks: [bot-network]
    deploy:
      resources:
        limits:
          memory: 600M

networks:
  bot-network:
    external: true
    name: bot-network

volumes:
  pgdata:
  redisdata:
  session-data:
  uploads-data:
