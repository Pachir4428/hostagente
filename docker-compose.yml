services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bothosting
      POSTGRES_USER: postgres
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  api:
    build: ./apps/api
    ports: ["3000:3000"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bothosting
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      JWT_SECRET: dev_jwt_secret
      JWT_REFRESH_SECRET: dev_jwt_refresh_secret
      INTERNAL_SECRET: dev_internal_secret
      FRONTEND_URL: http://localhost:3001
      COOKIE_SECURE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [bot-network]

  bot-runner:
    build: ./apps/bot-runner
    ports: ["4001:4001"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      INTERNAL_SECRET: dev_internal_secret
      BOT_ENGINE_IMAGE: bot-engine:latest
    depends_on:
      redis:
        condition: service_healthy
    networks: [bot-network]

  worker:
    build: ./apps/worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bothosting
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [bot-network]

  web:
    build: ./apps/web
    ports: ["3001:3001"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NODE_ENV: development
    depends_on: [api]
    networks: [bot-network]

networks:
  bot-network:
    driver: bridge

volumes:
  pgdata:
