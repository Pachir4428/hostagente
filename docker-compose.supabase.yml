# ─────────────────────────────────────────────────────────────
#  Stack local para testar contra uma base de dados Supabase.
#
#  Não inclui o container "postgres" — api e worker ligam-se
#  diretamente ao Postgres do teu projeto Supabase através de
#  DATABASE_URL / DIRECT_URL definidos no .env.
#
#  Uso:
#    cp .env.example .env
#    # preencher DATABASE_URL, DIRECT_URL (Supabase) e os restantes secrets
#    make supabase-migrate   # aplica o schema Prisma no Supabase
#    docker compose -f docker-compose.supabase.yml up -d --build
#
#  Depois de confirmar que tudo funciona, os mesmos DATABASE_URL/DIRECT_URL
#  podem ser usados em docker-compose.prod.yml na VPS (basta preenchê-los
#  no .env da VPS — o ficheiro já os lê como override).
# ─────────────────────────────────────────────────────────────

services:
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redisdata-supabase:/data
    networks: [bot-network-supabase]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      RUNNER_INTERNAL_URL: http://bot-runner:4001
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      MPESA_WEBHOOK_SECRET: ${MPESA_WEBHOOK_SECRET:-}
      EMOLA_WEBHOOK_SECRET: ${EMOLA_WEBHOOK_SECRET:-}
      MKESH_WEBHOOK_SECRET: ${MKESH_WEBHOOK_SECRET:-}
      APP_VERSION: ${APP_VERSION:-1.0.0}
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    networks: [bot-network-supabase]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
    build: ./apps/worker
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    networks: [bot-network-supabase]

  bot-runner:
    build: ./apps/bot-runner
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - session-data-supabase:/data/sessions
    environment:
      NODE_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      BOT_ENGINE_IMAGE: bot-engine:latest
    depends_on:
      redis:
        condition: service_healthy
    networks: [bot-network-supabase]

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: ${FRONTEND_API_URL:-http://localhost:3000}
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${FRONTEND_API_URL:-http://localhost:3000}
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy
    networks: [bot-network-supabase]

networks:
  bot-network-supabase:
    driver: bridge

volumes:
  redisdata-supabase:
  session-data-supabase:
